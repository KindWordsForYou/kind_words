<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dein täglicher Spruch 💫</title>

<style>
  /* CSS Light/Dark */
  :root {
    --bg-gradient: linear-gradient(135deg, #ffd1dc, #ffe0b3, #d1f7c4);
    --card-bg: white;
    --text-main: #333;
    --text-heading: #444;
    --text-muted: #888;
    --btn-bg: linear-gradient(135deg, #ffd1dc, #ffe0b3, #d1f7c4);
    --btn-text: #333;
    --shadow: rgba(0, 0, 0, 0.1);
    --divider: #eee;
  }

  /* Dark Mode Overrides */
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-gradient: linear-gradient(135deg, #2a2a40, #4a3b52, #2f4858);
      --card-bg: #1e1e2e;
      --text-main: #e0e0e0;
      --text-heading: #ffffff;
      --text-muted: #a0a0a0;
      --btn-bg: linear-gradient(135deg, #4a3b52, #2f4858);
      --btn-text: #e0e0e0;
      --shadow: rgba(0, 0, 0, 0.5);
      --divider: #333;
    }
  }

  * { box-sizing: border-box; }
  
  body {
    margin: 0;
    min-height: 100vh;
    font-family: "Segoe UI", system-ui, sans-serif;
    background: var(--bg-gradient);
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    color: var(--text-main);
  }

  .card {
    background: var(--card-bg);
    padding: 30px;
    border-radius: 25px;
    width: 100%;
    max-width: 400px;
    text-align: center;
    box-shadow: 0 20px 40px var(--shadow);
  }

  h1 { margin-top: 0; font-size: 1.8rem; color: var(--text-heading); }
  
  button {
    margin-top: 15px;
    background: var(--btn-bg);
    border: none;
    border-radius: 999px;
    padding: 15px 25px;
    font-size: 1.1rem;
    color: var(--btn-text);
    cursor: pointer;
    box-shadow: 0 8px 20px var(--shadow);
    transition: transform 0.1s ease, box-shadow 0.1s ease, opacity 0.2s ease;
  }

  button:active { transform: scale(0.97); box-shadow: 0 4px 10px var(--shadow); }
  
  /* Styling specifically for the Share Button */
  #share-btn {
    display: none;
    font-size: 0.9rem;
    padding: 10px 20px;
    margin-left: 10px;
  }
  #share-btn.visible { display: inline-block; }

  #quote-display {
    margin-top: 30px;
    font-size: 1.3rem;
    min-height: 60px;
    font-weight: 500;
  }

  /* The Reveal Animation */
  .fade-in { animation: fadeInScale 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
  
  @keyframes fadeInScale {
    0% { opacity: 0; transform: scale(0.9) translateY(10px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* History Section */
  .history-container {
    margin-top: 30px;
    padding-top: 20px;
    border-top: 1px solid var(--divider);
    text-align: left;
    display: none; /* Hidden until there is history */
  }
  .history-container.visible { display: block; }
  .history-container h3 { font-size: 1rem; color: var(--text-heading); margin-top: 0; margin-bottom: 10px; }
  
  #history-list {
    list-style: none;
    padding: 0; margin: 0;
    font-size: 0.9rem;
    color: var(--text-muted);
  }
  #history-list li { margin-bottom: 8px; font-style: italic; opacity: 0.8; }

  .footer { margin-top: 25px; font-size: 0.9rem; color: var(--text-muted); }
</style>
</head>
<body>

<div class="card">
  <h1> Homemade Weisheiten </h1>
  
  <div>
    <button id="generate-btn">Spruch anzeigen</button>
    <button id="share-btn">Teilen 💌</button>
  </div>

  <div id="quote-display"></div>

  <div class="history-container" id="history-container">
    <h3>Letzte Sprüche:</h3>
    <ul id="history-list"></ul>
  </div>

  <div class="footer"> Eine Weisheit am Tag 💕</div>
</div>

<script>
  const generateBtn = document.getElementById("generate-btn");
  const shareBtn = document.getElementById("share-btn");
  const quoteDisplay = document.getElementById("quote-display");
  const historyContainer = document.getElementById("history-container");
  const historyList = document.getElementById("history-list");

  // LocalStorage Keys
  const DATE_KEY = "lastQuoteDate";
  const INDEX_KEY = "lastQuoteIndex";
  const HISTORY_KEY = "quoteHistory";

  let quotesList = [];

  // 1. Fetch JSON Data & Check for Today's Quote
  fetch('data.json')
    .then(response => response.json())
    .then(data => {
      quotesList = data.quotes;
      loadHistory(); // Load previous quotes
      
      // NEW FIX: Check if they already generated a quote today!
      const todayStr = new Date().toDateString();
      const savedDateStr = localStorage.getItem(DATE_KEY);
      const savedIndex = localStorage.getItem(INDEX_KEY);

      // If they refresh the page, automatically show today's quote so it isn't lost
      if (savedDateStr === todayStr && savedIndex !== null) {
        displayQuote(quotesList[savedIndex]);
        disableButton();
      }
    })
    .catch(error => console.error('Error loading JSON:', error));

  // 2. Generate Button Logic
  generateBtn.addEventListener("click", () => {
    if (quotesList.length === 0) return;

    const todayStr = new Date().toDateString();
    const savedDateStr = localStorage.getItem(DATE_KEY);

    // If they already have a quote today, don't overwrite it!
    if (savedDateStr === todayStr) {
      disableButton();
      return;
    }

    let nextIndex;
    const previousIndex = localStorage.getItem(INDEX_KEY);
    
    // Pick a random quote that isn't the same as yesterday
    do {
      nextIndex = Math.floor(Math.random() * quotesList.length);
    } while (nextIndex == previousIndex && quotesList.length > 1);

    // Save yesterday's quote to history before updating today's
    if (previousIndex !== null && savedDateStr !== null) {
      saveToHistory(quotesList[previousIndex]);
    }

    // Update LocalStorage to today
    localStorage.setItem(DATE_KEY, todayStr);
    localStorage.setItem(INDEX_KEY, nextIndex);

    // Display the Quote with Animation and lock the button
    displayQuote(quotesList[nextIndex]);
    disableButton();
  });

  // 3. Helper Functions
  function displayQuote(text) {
    quoteDisplay.textContent = text;
    quoteDisplay.classList.remove("fade-in");
    void quoteDisplay.offsetWidth; // Force a browser reflow to restart animation
    quoteDisplay.classList.add("fade-in");
    shareBtn.classList.add("visible");
  }

  function disableButton() {
    // Changes the button text instead of deleting the quote
    generateBtn.textContent = "Komm morgen wieder 💕";
    generateBtn.style.opacity = "0.7";
    generateBtn.style.cursor = "not-allowed";
  }

  // 4. Share Button Logic
  shareBtn.addEventListener("click", async () => {
    const textToShare = quoteDisplay.textContent;
    const urlToShare = window.location.href;

    if (navigator.share) {
      try {
        await navigator.share({
          title: 'Homemade Weisheiten',
          text: `"${textToShare}"\n`,
          url: urlToShare
        });
      } catch (err) {
        console.log('User canceled share or error:', err);
      }
    } else {
      navigator.clipboard.writeText(`"${textToShare}" - ${urlToShare}`);
      alert("Spruch in die Zwischenablage kopiert! 📋");
    }
  });

  // 5. History Logic
  function saveToHistory(quoteText) {
    let history = JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");
    history.unshift(quoteText); 
    
    if (history.length > 3) {
      history.pop(); // Keep only the last 3 days
    }
    
    localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
    loadHistory();
  }

  function loadHistory() {
    const history = JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");
    
    if (history.length > 0) {
      historyContainer.classList.add("visible");
      historyList.innerHTML = ""; 
      
      history.forEach(quote => {
        const li = document.createElement("li");
        li.textContent = `"${quote}"`;
        historyList.appendChild(li);
      });
    }
  }
</script>

</body>
</html>
